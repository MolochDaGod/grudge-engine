<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candle — WebGPU Flame — Grudge Engine</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
    #grudge-canvas { display:block; width:100vw; height:100vh; touch-action:none; outline:none; }

    #loading-overlay {
      position:fixed; inset:0; background:rgba(4,5,10,.97);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:100; transition:opacity .7s;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .logo-wrap { width:72px; height:72px; border-radius:12px; overflow:hidden; margin-bottom:18px; }
    .logo-wrap img { width:100%; height:100%; object-fit:cover; }
    #loading-title { color:#c8a84b; font-size:1.3rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    #loading-sub   { color:#6b7399; font-size:.7rem; margin-top:6px; }
    #loading-bar-wrap { width:240px; height:5px; background:#1e2330; border-radius:3px; margin-top:20px; overflow:hidden; }
    #loading-bar { height:100%; width:0%; background:linear-gradient(90deg,#ff6a00,#c8a84b); transition:width .35s; border-radius:3px; }
    #loading-status { color:#ff9040; font-size:.65rem; margin-top:8px; }

    #engine-badge {
      position:fixed; top:16px; right:16px;
      font-size:.62rem; font-weight:700; padding:3px 10px; border-radius:4px;
      letter-spacing:.1em; text-transform:uppercase;
    }
    .badge-webgpu  { background:#4bffa5; color:#000; }
    .badge-webgl2  { background:#c8a84b; color:#000; }

    #back { position:fixed; top:14px; left:16px; color:#6b7399; font-size:.75rem; text-decoration:none; }
    #back:hover { color:#c8a84b; }
    #hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#6b7399; font-size:.62rem; pointer-events:none; }
  </style>
</head>
<body>
  <canvas id="grudge-canvas" tabindex="0"></canvas>

  <div id="loading-overlay">
    <div class="logo-wrap"><img src="/favicon.png" alt="Grudge"></div>
    <div id="loading-title">Candle</div>
    <div id="loading-sub">WebGPU Compute Flame · WebGL2 FireMaterial fallback</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-status">Detecting GPU…</div>
  </div>

  <div id="engine-badge"></div>
  <a id="back" href="/../../../">← Gallery</a>
  <div id="hint">Drag to orbit · Scroll to zoom</div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
