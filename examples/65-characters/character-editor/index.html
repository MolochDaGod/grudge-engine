<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Editor — Grudge Engine</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --surface2:#21262d;
      --border:  #30363d;
      --accent:  #c8a84b;
      --blue:    #58a6ff;
      --green:   #7ee787;
      --purple:  #d2a8ff;
      --red:     #f85149;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --font:    'Courier New', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; height:100vh; display:flex; flex-direction:column; }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    #topbar {
      height:38px; background:linear-gradient(180deg,var(--surface),var(--bg));
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 10px; gap:8px; flex-shrink:0;
    }
    .logo-badge {
      width:22px; height:22px; border-radius:5px;
      background:linear-gradient(135deg,var(--purple),#6d28d9);
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:900; color:#fff;
    }
    .topbar-title { font-size:12px; font-weight:700; color:var(--text); letter-spacing:.05em; }
    .topbar-div { width:1px; height:18px; background:var(--border); }
    .topbar-btn {
      padding:3px 8px; font-size:10px; font-family:var(--font);
      background:transparent; border:none; color:var(--muted); cursor:pointer; border-radius:3px;
    }
    .topbar-btn:hover { color:var(--text); background:var(--surface2); }
    .topbar-badge {
      font-size:9px; padding:2px 7px; border-radius:10px; font-weight:700;
      background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    }
    .topbar-badge.active { background:#58a6ff15; border-color:#58a6ff40; color:var(--blue); }
    #fps-display { margin-left:auto; font-size:9px; color:var(--muted); font-family:monospace; }

    /* ── Main layout ─────────────────────────────────────────────────── */
    #main { display:flex; flex:1; overflow:hidden; }

    /* ── Left panel — character browser ─────────────────────────────── */
    #left-panel {
      width:220px; background:var(--bg); border-right:1px solid var(--border);
      display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
    }
    .panel-header {
      padding:8px 10px; border-bottom:1px solid var(--border);
      font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      color:var(--accent);
    }
    #char-search {
      margin:8px; padding:5px 8px; background:var(--surface); border:1px solid var(--border);
      border-radius:4px; color:var(--text); font-family:var(--font); font-size:10px; outline:none;
    }
    #char-search::placeholder { color:var(--muted); }
    #char-list { flex:1; overflow-y:auto; padding:0 6px 6px; }
    #char-list::-webkit-scrollbar { width:3px; }
    #char-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .char-item {
      display:flex; align-items:center; gap:8px; padding:7px 8px; margin-bottom:2px;
      border-radius:5px; cursor:pointer; border:1px solid transparent;
      transition:all .12s;
    }
    .char-item:hover  { background:var(--surface); border-color:var(--border); }
    .char-item.active { background:var(--surface); border-color:var(--blue); }
    .char-thumb {
      width:28px; height:28px; border-radius:4px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; background:var(--surface2);
    }
    .char-name { font-size:11px; font-weight:600; }
    .char-cat  { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .cat-tag {
      font-size:8px; padding:1px 5px; border-radius:3px; font-weight:600;
      display:inline-block; margin-top:1px;
    }
    .cat-warrior { background:#58a6ff20; color:var(--blue); }
    .cat-caster  { background:#d2a8ff20; color:var(--purple); }
    .cat-rogue   { background:#f0883e20; color:#f0883e; }
    .cat-undead  { background:#f8514920; color:var(--red); }
    .cat-creature{ background:#7ee78720; color:var(--green); }
    .cat-other   { background:#8b949e20; color:var(--muted); }

    /* ── Viewport ────────────────────────────────────────────────────── */
    #viewport-wrap { flex:1; position:relative; overflow:hidden; }
    #grudge-canvas { display:block; width:100%; height:100%; }
    #viewport-overlay {
      position:absolute; bottom:12px; left:12px;
      font-size:9px; color:var(--muted); pointer-events:none; line-height:1.8;
    }
    #char-name-display {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      color:var(--accent); font-size:.82rem; font-weight:700; letter-spacing:.08em;
      pointer-events:none;
    }
    #loading-msg {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background:rgba(13,17,23,.85); color:var(--blue); font-size:.75rem; letter-spacing:.1em;
      pointer-events:none;
    }
    #loading-msg.hidden { display:none; }

    /* ── Right panel ─────────────────────────────────────────────────── */
    #right-panel {
      width:260px; background:var(--bg); border-left:1px solid var(--border);
      display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
    }
    .right-section { border-bottom:1px solid var(--border); }
    .right-section-title {
      padding:7px 10px; font-size:9px; font-weight:700; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:space-between;
    }
    .right-section-title:hover { color:var(--text); }
    .right-body { padding:8px; }

    /* Anim grid */
    #anim-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
    .anim-btn {
      padding:5px 4px; font-size:9px; text-align:center; cursor:pointer;
      background:var(--surface); border:1px solid var(--border); border-radius:3px;
      color:var(--muted); font-family:var(--font); transition:all .1s; line-height:1.2;
    }
    .anim-btn:hover  { border-color:var(--blue); color:var(--blue); background:var(--surface2); }
    .anim-btn.active { border-color:var(--green); color:var(--green); background:#7ee78710; }

    /* Anim groups tabs */
    #anim-tabs { display:flex; gap:2px; padding:6px 8px 0; }
    .anim-tab {
      padding:3px 7px; font-size:9px; cursor:pointer; border-radius:3px;
      background:transparent; border:1px solid var(--border); color:var(--muted);
      font-family:var(--font);
    }
    .anim-tab.active { border-color:var(--purple); color:var(--purple); background:#d2a8ff10; }

    /* Stats */
    .stat-row { display:flex; justify-content:space-between; padding:3px 0; font-size:10px; }
    .stat-key { color:var(--muted); }
    .stat-val { color:var(--text); font-weight:600; }
    .stat-val.good { color:var(--green); }
    .stat-val.warn { color:var(--accent); }
    .stat-val.bad  { color:var(--red); }

    /* Weapon equip */
    #weapon-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
    .weapon-btn {
      padding:4px 3px; font-size:8px; text-align:center; cursor:pointer;
      background:var(--surface); border:1px solid var(--border); border-radius:3px;
      color:var(--muted); font-family:var(--font); transition:all .1s;
    }
    .weapon-btn:hover  { border-color:var(--accent); color:var(--accent); }
    .weapon-btn.active { border-color:var(--accent); color:var(--accent); background:#c8a84b10; }

    /* Blend / playback controls */
    .ctrl-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .ctrl-label { font-size:9px; color:var(--muted); width:70px; flex-shrink:0; }
    .ctrl-range { flex:1; accent-color:var(--blue); }
    .ctrl-val { font-size:9px; color:var(--blue); width:28px; text-align:right; font-family:monospace; }
    .play-btn {
      flex:1; padding:5px; font-size:10px; cursor:pointer;
      background:var(--surface2); border:1px solid var(--border);
      color:var(--text); border-radius:4px; font-family:var(--font); text-align:center;
    }
    .play-btn:hover { border-color:var(--green); color:var(--green); }
    .play-btn.stop-btn:hover { border-color:var(--red); color:var(--red); }

    /* Scrollable right panel */
    #right-scroll { flex:1; overflow-y:auto; }
    #right-scroll::-webkit-scrollbar { width:3px; }
    #right-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* Back */
    #back { position:fixed; top:10px; right:14px; color:var(--muted); font-size:.72rem; text-decoration:none; z-index:100; }
    #back:hover { color:var(--accent); }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div id="topbar">
    <div class="logo-badge">G</div>
    <span class="topbar-title">Character Editor</span>
    <div class="topbar-div"></div>
    <button class="topbar-btn" id="btn-reset-cam">Reset Camera</button>
    <button class="topbar-btn" id="btn-toggle-bg">Toggle BG</button>
    <button class="topbar-btn" id="btn-toggle-grid">Grid</button>
    <div class="topbar-div"></div>
    <span class="topbar-badge" id="badge-engine">WebGL2</span>
    <span class="topbar-badge active" id="badge-anim">No Anim</span>
    <span id="fps-display">— fps</span>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Left: character browser -->
    <div id="left-panel">
      <div class="panel-header">Characters (24)</div>
      <input type="text" id="char-search" placeholder="Filter characters…">
      <div id="char-list"></div>
    </div>

    <!-- Center: 3D viewport -->
    <div id="viewport-wrap">
      <canvas id="grudge-canvas"></canvas>
      <div id="char-name-display">Select a Character</div>
      <div id="viewport-overlay">
        Drag → orbit · Scroll → zoom · Right-drag → pan
      </div>
      <div id="loading-msg">Loading…</div>
    </div>

    <!-- Right: animation + props panel -->
    <div id="right-panel">
      <div id="right-scroll">

        <!-- Playback controls -->
        <div class="right-section">
          <div class="right-section-title">Playback</div>
          <div class="right-body">
            <div class="ctrl-row">
              <span class="ctrl-label">Speed</span>
              <input type="range" id="ctrl-speed" class="ctrl-range" min="0.1" max="3" step="0.05" value="1">
              <span class="ctrl-val" id="val-speed">1.0</span>
            </div>
            <div class="ctrl-row">
              <span class="ctrl-label">Blend</span>
              <input type="range" id="ctrl-blend" class="ctrl-range" min="0" max="0.5" step="0.01" value="0.15">
              <span class="ctrl-val" id="val-blend">.15</span>
            </div>
            <div class="ctrl-row">
              <button class="play-btn" id="btn-pause">⏸ Pause</button>
              <button class="play-btn stop-btn" id="btn-stop">⏹ Stop</button>
            </div>
          </div>
        </div>

        <!-- Animations -->
        <div class="right-section">
          <div class="right-section-title">Animations</div>
          <div id="anim-tabs">
            <button class="anim-tab active" data-pack="embedded">Embedded</button>
            <button class="anim-tab" data-pack="ual1">UAL1</button>
            <button class="anim-tab" data-pack="ual2">UAL2</button>
          </div>
          <div class="right-body" style="padding-top:6px">
            <div id="anim-grid"></div>
          </div>
        </div>

        <!-- Weapon equip -->
        <div class="right-section">
          <div class="right-section-title">KayKit Weapons</div>
          <div class="right-body">
            <div id="weapon-grid"></div>
          </div>
        </div>

        <!-- Stats -->
        <div class="right-section">
          <div class="right-section-title">Model Stats</div>
          <div class="right-body" id="stats-body">
            <div class="stat-row"><span class="stat-key">Meshes</span><span class="stat-val" id="stat-meshes">—</span></div>
            <div class="stat-row"><span class="stat-key">Vertices</span><span class="stat-val" id="stat-verts">—</span></div>
            <div class="stat-row"><span class="stat-key">Triangles</span><span class="stat-val" id="stat-tris">—</span></div>
            <div class="stat-row"><span class="stat-key">Materials</span><span class="stat-val" id="stat-mats">—</span></div>
            <div class="stat-row"><span class="stat-key">Bones</span><span class="stat-val" id="stat-bones">—</span></div>
            <div class="stat-row"><span class="stat-key">Animations</span><span class="stat-val" id="stat-anims">—</span></div>
            <div class="stat-row"><span class="stat-key">Height</span><span class="stat-val" id="stat-height">—</span></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <a id="back" href="/../../../">← Gallery</a>
  <script type="module" src="./main.ts"></script>
</body>
</html>
