<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weapon Viewer — Grudge Engine</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0b0f; overflow:hidden; font-family:'Courier New',monospace; }
    #grudge-canvas { display:block; width:100vw; height:100vh; }
    #weapon-bar {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(10,11,15,.9); border-top:1px solid #1e2330;
      display:flex; gap:4px; padding:10px 14px; overflow-x:auto;
    }
    .w-btn {
      background:transparent; border:1px solid #1e2330; color:#6b7399;
      font-family:'Courier New',monospace; font-size:.62rem; padding:4px 9px;
      border-radius:3px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .w-btn:hover, .w-btn.active { border-color:#c8a84b; color:#c8a84b; }
    #name-tag { position:fixed; top:16px; left:50%; transform:translateX(-50%); color:#c8a84b; font-size:.85rem; font-weight:700; letter-spacing:.1em; pointer-events:none; }
    #back { position:fixed; top:14px; left:16px; color:#6b7399; font-size:.75rem; text-decoration:none; }
    #back:hover { color:#c8a84b; }
    #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#4bffa5; font-size:.8rem; }
  </style>
</head>
<body>
  <canvas id="grudge-canvas"></canvas>
  <div id="name-tag">Select a weapon below</div>
  <div id="loading"></div>
  <div id="weapon-bar"></div>
  <a id="back" href="/../../../">← Gallery</a>
  <script type="module" src="./main.ts"></script>
</body>
</html>
