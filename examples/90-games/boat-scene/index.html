<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boat Scene — Grudge Engine</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
    #grudge-canvas { display:block; width:100vw; height:100vh; touch-action:none; outline:none; }

    /* Loading overlay */
    #loading-overlay {
      position:fixed; inset:0; background:rgba(4,5,10,.97);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:100; transition:opacity .6s;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .logo-wrap { width:80px; height:80px; border-radius:16px; overflow:hidden; margin-bottom:20px; }
    .logo-wrap img { width:100%; height:100%; object-fit:cover; }
    #loading-title { color:#c8a84b; font-size:1.4rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    #loading-sub   { color:#6b7399; font-size:.72rem; margin-top:6px; }
    #loading-bar-wrap {
      width:260px; height:6px; background:#1e2330; border-radius:3px; margin-top:24px; overflow:hidden;
    }
    #loading-bar { height:100%; width:0%; background:linear-gradient(90deg,#4bffa5,#c8a84b); transition:width .25s; border-radius:3px; }
    #loading-status { color:#4bffa5; font-size:.68rem; margin-top:10px; }

    /* HUD */
    #hud {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      color:#c8a84b; font-size:.72rem; pointer-events:none; text-shadow:0 1px 4px #000;
    }
    #controls-hint {
      position:fixed; bottom:16px; right:16px;
      color:#6b7399; font-size:.62rem; text-align:right; line-height:1.7; pointer-events:none;
    }
    #back { position:fixed; top:14px; left:16px; color:#6b7399; font-size:.75rem; text-decoration:none; }
    #back:hover { color:#c8a84b; }
  </style>
</head>
<body>
  <canvas id="grudge-canvas" tabindex="0"></canvas>

  <div id="loading-overlay">
    <div class="logo-wrap"><img src="/favicon.png" alt="Grudge"></div>
    <div id="loading-title">Boat Scene</div>
    <div id="loading-sub">Corsair King · Ship · Shark · Water</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-status">Initializing…</div>
  </div>

  <div id="hud">Boat Scene — Right-click to change camera · Click to advance path</div>
  <div id="controls-hint">
    Drag → rotate camera<br>
    Scroll → zoom<br>
    Right-click → switch view
  </div>
  <a id="back" href="/../../../">← Gallery</a>

  <script type="module" src="./main.ts"></script>
</body>
</html>
